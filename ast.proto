syntax = "proto3";

package gluon;

option go_package = "github.com/accretional/gluon/pb";

// ASTDescriptor is a language-agnostic container for a serialized abstract
// syntax tree. It pairs the source language identity with the tree itself,
// enabling cross-language AST manipulation and transpilation via protobuf
// as the common interchange format.
message ASTDescriptor {
  // Language this AST was parsed from (e.g. "go", "proto", "ebnf").
  string language = 1;

  // Language spec version used during parsing (e.g. "1.26", "3").
  string version = 2;

  // Root node of the abstract syntax tree.
  ASTNodeDescriptor root = 3;
}

// ASTNodeDescriptor represents a single node in a language-agnostic AST.
// Each node's kind maps to a production name from the source language's
// GrammarDescriptor. Leaf nodes (terminals) carry a value; interior nodes
// carry children. This structure is mechanically derived from EBNF
// production rules.
message ASTNodeDescriptor {
  // Node type — maps to a production name (e.g. "Expression", "Term")
  // or "terminal" for literal matches.
  string kind = 1;

  // Terminal value — populated for leaf nodes (quoted strings, identifiers).
  string value = 2;

  // Child nodes — the sub-expressions that matched.
  repeated ASTNodeDescriptor children = 3;

  // Source position where this node was parsed from.
  SourceLocation location = 4;
}

// SourceLocation identifies a position in source text.
message SourceLocation {
  // Byte offset from start of source.
  int32 offset = 1;

  // Line number (1-based).
  int32 line = 2;

  // Column number (1-based, in bytes).
  int32 column = 3;
}
