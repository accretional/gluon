syntax = "proto3";

package gluon.v2;

option go_package = "github.com/accretional/gluon/v2/pb";

import "v2/lex.proto";

// TokenSequence is a linear stream of classified tokens — the output of
// lexing a DocumentDescriptor against a LexDescriptor, and the input to
// CST parsing against a GrammarDescriptor.
//
// Tokens carry their role (delimiter / scoper-boundary / literal) rather
// than raw characters: the parser never needs to re-consult the lex
// tables, and the serialized form stays compact.
message TokenSequence {
  // Optional name — typically the source document's name.
  string name = 1;

  // URI of the source document the tokens were lexed from. Each token's
  // `offset` points into this document.
  string uri = 2;

  repeated Token tokens = 3;
}

// Token is one classified element of a TokenSequence.
//
// Every token carries an `offset` into TokenSequence.uri. The optional
// `kind` oneof says what role (if any) the characters at that offset
// play.
//
// ===========================================================================
// LOAD-BEARING CONVENTION — READ BEFORE TOUCHING THIS MESSAGE
// ===========================================================================
//
// A Token whose `kind` oneof is unset is a LITERAL TEXT run beginning at
// `offset`. This is the canonical representation of a text/identifier
// token; there is no separate "text" variant.
//
// Because proto3 cannot distinguish "oneof unset" from "oneof set to the
// zero value" at the wire level, the following forms are ALL equivalent
// and all mean "literal text":
//
//   1. Token { offset: N }                          ← canonical
//   2. Token { offset: N, delimiter: DELIMITER_UNSPECIFIED }
//   3. Token { offset: N, scoper: { lhs: SCOPER_UNSPECIFIED } }
//   4. Token { offset: N, scoper: { rhs: SCOPER_UNSPECIFIED } }
//   5. Token { offset: N, scoper: {} }              ← empty ScoperToken
//
// Producers SHOULD emit form (1). Consumers MUST accept all five.
//
// Implications:
//   - Never assign DELIMITER_UNSPECIFIED or SCOPER_UNSPECIFIED as a real
//     role — doing so silently reclassifies the token as literal text.
//   - Never reorder Delimiter or Scoper enum values; keeping the zero
//     value reserved for "unspecified" is what makes the convention work.
//   - Literal-run length is implied by the next token's offset, so the
//     lexer MUST emit a token (typically Delimiter.WHITESPACE) for every
//     skipped run — otherwise literal boundaries are lost.
//
// ===========================================================================
message Token {
  // If unset (or populated with the UNSPECIFIED zero value of either
  // inner enum), this Token is a literal text run starting at `offset`.
  // See the banner above.
  oneof kind {
    Delimiter delimiter = 1;
    ScoperToken scoper = 2;
  }

  // Byte offset into TokenSequence.uri where this token begins.
  int32 offset = 3;
}

// ScoperToken tags a paired scoper as either its opening or closing
// side. Using a oneof (lhs/rhs) rather than (kind, side) pair saves a
// field on the wire: each ScoperToken serializes as one tag-value
// entry rather than two.
message ScoperToken {
  oneof kind {
    // Opening side of a scoper pair (e.g. "[" for OPTIONAL, "(*" for
    // COMMENT).
    Scoper lhs = 1;

    // Closing side of a scoper pair (e.g. "]" for OPTIONAL, "*)" for
    // COMMENT).
    Scoper rhs = 2;
  }
}
