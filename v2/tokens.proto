syntax = "proto3";

package gluon.v2;

option go_package = "github.com/accretional/gluon/v2/pb";

import "v2/lex.proto";

// TokenSequence is a linear stream of classified tokens — the output of
// lexing a DocumentDescriptor against a LexDescriptor, and the input to
// CST parsing against a GrammarDescriptor.
//
// Tokens carry their role (delimiter / scoper-boundary / literal) rather
// than raw characters: the parser never needs to re-consult the lex
// tables, and the serialized form stays compact.
//
// Literal tokens encode their payload in one of two ways: as a byte
// offset into the source document identified by `uri` (cheap — one
// varint), or as an inline string (for synthetic tokens that have no
// backing source).
message TokenSequence {
  // Optional name — typically the source document's name.
  string name = 1;

  // URI of the source document the tokens were lexed from. Literal
  // tokens carrying an `offset` are resolved against this URI.
  string uri = 2;

  repeated Token tokens = 3;
}

// Token is one classified element of a TokenSequence.
message Token {
  oneof kind {
    // A role-only separator (ALTERNATION, CONCATENATION, …).
    Delimiter delimiter = 1;

    // The begin or end of a paired scoper (OPTIONAL, GROUP, TERMINAL, …).
    ScoperBoundary scoper = 2;

    // Byte offset into TokenSequence.uri marking the start of a literal
    // run. The run's length is implied by the position of the next
    // non-literal token.
    int32 offset = 3;

    // Inline literal text — for synthetic tokens that have no backing
    // source (generated by tooling, injected for error recovery, etc.).
    string text = 4;
  }
}

// ScoperBoundary names one side of a paired scoper.
message ScoperBoundary {
  Scoper kind = 1;

  // Which side of the pair this token is.
  enum Side {
    SIDE_UNSPECIFIED = 0;
    BEGIN = 1;
    END = 2;
  }
  Side side = 2;
}
