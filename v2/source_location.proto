syntax = "proto3";

package gluon.v2;

option go_package = "github.com/accretional/gluon/v2/pb";

// SourceLocation is a byte-range pointer into a TextDescriptor.
// It lets downstream messages refer to a region of source text without
// copying the bytes themselves — useful for CST nodes, diagnostics, and
// chunked TextDescriptors that share a backing buffer.
message SourceLocation {
  // Name of the TextDescriptor this location refers to. Empty means
  // "the enclosing/ambient text".
  string text = 1;

  // Byte offset from the start of the referenced text.
  int32 offset = 2;

  // Byte length of the region. Zero length = a point (e.g. a cursor).
  int32 length = 3;

  // Optional 1-based line/column for human-readable diagnostics.
  // Producers may leave these as 0 when not computed.
  int32 line = 4;
  int32 column = 5;
}
