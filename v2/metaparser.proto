syntax = "proto3";

package gluon.v2;

option go_package = "github.com/accretional/gluon/v2/pb";

import "google/protobuf/wrappers.proto";

import "v2/ast.proto";
import "v2/document.proto";
import "v2/grammar.proto";
import "v2/text.proto";
import "v2/tokens.proto";

// Metaparser is the bottom-up parsing pipeline.
//
// Typical flow (file on disk → CST):
//
//   bytes                                      ← io.ReadFile
//     → ReadBytes   → TextDescriptor           ← raw bytes
//   string                                     ← a name for the document
//     → ReadString  → DocumentDescriptor
//   DocumentDescriptor                         ← EBNF source
//     → EBNF        → GrammarDescriptor        ← rules + lex conventions
//   TokenSequence + GrammarDescriptor
//     → CST         → ASTDescriptor            ← concrete syntax tree
//
// A separate compiler (not part of Metaparser) lowers an ASTDescriptor
// into a FileDescriptorProto or any other target shape.
service Metaparser {
  // ReadBytes classifies a raw byte buffer into a TextDescriptor,
  // choosing an encoding (ASCII / unicode_val / unicode_string) based
  // on the input.
  rpc ReadBytes(google.protobuf.BytesValue) returns (TextDescriptor);

  // ReadString lifts a single string into a DocumentDescriptor with a
  // single TextDescriptor chunk. Cheap entry point when the source is
  // already in memory as a Go string.
  rpc ReadString(google.protobuf.StringValue) returns (DocumentDescriptor);

  // EBNF parses a DocumentDescriptor containing EBNF source into a
  // GrammarDescriptor. Internally lexes according to a LexDescriptor
  // configured for the input's EBNF dialect.
  rpc EBNF(DocumentDescriptor) returns (GrammarDescriptor);

  // CST parses an already-lexed TokenSequence against a grammar,
  // producing an ASTDescriptor that carries the full concrete syntax
  // tree (every matched token).
  rpc CST(CstRequest) returns (ASTDescriptor);
}

// CstRequest bundles the grammar, the token stream, and the source
// document to parse against. The grammar carries its own LexDescriptor —
// callers are expected to have lexed `tokens` with that same
// LexDescriptor (or a compatible one); the RPC does not re-lex.
//
// `document` is required because tokens carry offsets (not text), and
// matching a grammar Terminal against the source requires the actual
// characters. `tokens.uri` SHOULD equal `document.uri` so offsets
// resolve correctly, but the RPC does not enforce this.
message CstRequest {
  GrammarDescriptor grammar = 1;
  TokenSequence tokens = 2;
  DocumentDescriptor document = 3;
}
