syntax = "proto3";

package gluon.v2;

option go_package = "github.com/accretional/gluon/v2/pb";

import "google/protobuf/descriptor.proto";
import "google/protobuf/wrappers.proto";

import "v2/ast.proto";
import "v2/document.proto";
import "v2/grammar.proto";
import "v2/text.proto";
import "v2/tokens.proto";

// Metaparser is the bottom-up parsing pipeline.
//
// Typical flow (file on disk → CST):
//
//   bytes                                      ← io.ReadFile
//     → ReadBytes   → TextDescriptor           ← raw bytes
//   string                                     ← a name for the document
//     → ReadString  → DocumentDescriptor
//   DocumentDescriptor                         ← EBNF source
//     → EBNF        → GrammarDescriptor        ← rules + lex conventions
//   TokenSequence + GrammarDescriptor
//     → CST         → ASTDescriptor            ← concrete syntax tree
//
// A separate compiler (not part of Metaparser) lowers an ASTDescriptor
// into a FileDescriptorProto or any other target shape.
service Metaparser {
  // ReadBytes classifies a raw byte buffer into a TextDescriptor,
  // choosing an encoding (ASCII / unicode_val / unicode_string) based
  // on the input.
  rpc ReadBytes(google.protobuf.BytesValue) returns (TextDescriptor);

  // ReadString lifts a single string into a DocumentDescriptor with a
  // single TextDescriptor chunk. Cheap entry point when the source is
  // already in memory as a Go string.
  rpc ReadString(google.protobuf.StringValue) returns (DocumentDescriptor);

  // EBNF parses a DocumentDescriptor containing EBNF source into a
  // GrammarDescriptor. Internally lexes according to a LexDescriptor
  // configured for the input's EBNF dialect.
  rpc EBNF(DocumentDescriptor) returns (GrammarDescriptor);

  // CST parses an already-lexed TokenSequence against a grammar,
  // producing an ASTDescriptor that carries the full concrete syntax
  // tree (every matched token).
  rpc CST(CstRequest) returns (ASTDescriptor);

  // Transform runs a proto-expr ScriptDescriptor over an ASTDescriptor.
  // The script is accepted as a textproto string (not a typed message)
  // so this RPC can ship without pulling proto-expr into gluon's proto
  // imports; the server parses it as
  // `proto_expr.ScriptDescriptor`. The ast register is pre-populated
  // with the request's ASTDescriptor (as binary Data) under the name
  // "ast", and the Transformer service (v2/astkit.proto) is pre-wired
  // as a handler for URIs of the form "astkit://<Method>". The final
  // Data produced by the script is returned.
  rpc Transform(TransformRequest) returns (TransformResponse);

  // Compile lowers a schema-shaped ASTDescriptor into a
  // FileDescriptorProto. The AST kind conventions are documented in
  // gluon/v2/compiler (file / rule / sequence / alternation / optional /
  // repetition / group / terminal / nonterminal / range). One proto
  // message is emitted per rule; terminal literals are deduplicated
  // into empty keyword messages appended after the rules.
  //
  // Callers that hold a GrammarDescriptor (rather than an AST) should
  // convert via compiler.GrammarToAST before calling this RPC.
  rpc Compile(CompileRequest) returns (CompileResponse);
}

// CstRequest bundles the grammar, the token stream, and the source
// document to parse against. The grammar carries its own LexDescriptor —
// callers are expected to have lexed `tokens` with that same
// LexDescriptor (or a compatible one); the RPC does not re-lex.
//
// `document` is required because tokens carry offsets (not text), and
// matching a grammar Terminal against the source requires the actual
// characters. `tokens.uri` SHOULD equal `document.uri` so offsets
// resolve correctly, but the RPC does not enforce this.
message CstRequest {
  GrammarDescriptor grammar = 1;
  TokenSequence tokens = 2;
  DocumentDescriptor document = 3;
}

// TransformRequest carries an ASTDescriptor plus a script that rewrites
// or compiles it. `script_textproto` is a prototext-encoded
// `proto_expr.ScriptDescriptor`; passing it as a string keeps gluon's
// proto tree free of a proto-expr import without losing type safety at
// the Go layer (the server unmarshals into the typed message).
message TransformRequest {
  ASTDescriptor ast = 1;
  string script_textproto = 2;
}

// TransformResponse carries the final Data produced by the script.
// `data_binary` and `data_text` are the two concrete encodings
// `proto_expr.Data` supports; exactly one is set, or neither if the
// script yielded an empty Data. `data_type` echoes `proto_expr.Data.type`
// so callers can branch on it without re-reading the Data message.
message TransformResponse {
  string data_type = 1;
  bytes data_binary = 2;
  string data_text = 3;
}

// CompileRequest: schema-AST + naming options. `package` overrides the
// default derived from ast.language. `go_package` sets the
// FileDescriptorProto go_package option (omitted if empty).
// `file_name` sets FileDescriptorProto.name (defaults to
// "<package>.proto").
message CompileRequest {
  ASTDescriptor ast = 1;
  string package = 2;
  string go_package = 3;
  string file_name = 4;
}

// CompileResponse wraps the emitted FileDescriptorProto.
message CompileResponse {
  google.protobuf.FileDescriptorProto file = 1;
}
