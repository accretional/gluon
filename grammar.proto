syntax = "proto3";

package gluon;

option go_package = "github.com/accretional/gluon/pb";

import "lex.proto";
import "unicode/utf_8.proto";

// GrammarDescriptor represents a complete grammar defined in EBNF notation.
// It pairs the lexical configuration (how to read the EBNF) with the
// production rules that define the language.
message GrammarDescriptor {
  // Lexical structure of the EBNF notation used to write this grammar.
  LexDescriptor lex = 1;

  // Production rules that define the grammar.
  repeated ProductionDescriptor productions = 2;
}

// ProductionDescriptor represents a single EBNF production rule.
// For example: letter = "A" | "B" | "C" ;
message ProductionDescriptor {
  // Production name (left-hand side), e.g. "letter".
  string name = 1;

  // The expression body as a token sequence — each character of the
  // EBNF expression represented as a unicode.UTF8 value.
  TokenDescriptor token = 2;

  // Structured RHS. Populated by lexkit.Parse alongside `token`.
  ProductionExpression body = 3;
}

// ProductionExpression is a node in the structured tree of an EBNF
// production's right-hand side. Each kind is its own typed message so
// readers don't need to decode a generic S-expression.
message ProductionExpression {
  oneof kind {
    Sequence sequence = 1;       // a , b , c
    Alternation alternation = 2; // a | b | c
    Optional optional = 3;       // [ x ]
    Repetition repetition = 4;   // { x }
    Group group = 5;             // ( x )
    Terminal terminal = 6;       // "literal"
    NonTerminal nonterminal = 7; // production_name
    Range range = 8;             // "a" … "z"
  }
}

message Sequence {
  repeated ProductionExpression items = 1;
}

message Alternation {
  repeated ProductionExpression variants = 1;
}

message Optional {
  ProductionExpression body = 1;
}

message Repetition {
  ProductionExpression body = 1;
}

message Group {
  ProductionExpression body = 1;
}

message Terminal {
  // The literal text (without the surrounding quote characters).
  string literal = 1;
}

message NonTerminal {
  // Name of the referenced production.
  string name = 1;
}

message Range {
  // Inclusive lower and upper bounds, encoded as single UTF-8 characters.
  unicode.UTF8 lower = 1;
  unicode.UTF8 upper = 2;
}

// TokenDescriptor represents a sequence of characters, each encoded as
// a unicode.UTF8 value. For ASCII characters, the enum name provides a
// readable representation (e.g. VERTICAL_LINE for '|').
message TokenDescriptor {
  repeated unicode.UTF8 chars = 1;
}
